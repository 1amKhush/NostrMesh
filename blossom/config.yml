server:
  host: 0.0.0.0
  port: 3000
  publicBaseUrl: http://localhost:3000

storage:
  path: /data/blossom

limits:
  maxUploadBytes: 104857600

cors:
  allowedOrigins:
    - http://localhost:3000
    - http://localhost:4000
    - http://127.0.0.1:3000
    - http://127.0.0.1:4000

auth:
  requireAuth: true
  maxClockSkewSeconds: 30
