server:
  host: 0.0.0.0
  port: 3000
  # Can be overridden by BLOSSOM_PUBLIC_URL at runtime.
  # Keep localhost as fallback for local-only development.
  publicBaseUrl: http://localhost:3000

storage:
  path: /data/blossom

limits:
  maxUploadBytes: 104857600

cors:
  allowedOrigins:
    - "*"

auth:
  requireAuth: true
  maxClockSkewSeconds: 30
